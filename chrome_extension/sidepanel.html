<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 15px; margin: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    h3 { color: #569cd6; margin-top: 0; }

    #chat-history { flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
    .msg { margin-bottom: 12px; line-height: 1.4; }
    .msg-user { color: #4caf50; }
    .msg-bot { color: #cecece; }

    details.tool-detail { margin: 6px 0; border-left: 3px solid #569cd6; padding-left: 8px; }
    details.tool-detail summary { cursor: pointer; color: #569cd6; font-size: 0.8em; user-select: none; }
    details.tool-detail summary:hover { color: #9cdcfe; }
    details.tool-detail pre { background: #252526; padding: 8px; border-radius: 4px; font-size: 0.78em; overflow-x: auto; margin: 4px 0 0; white-space: pre-wrap; word-break: break-word; }

    .input-row { display: flex; gap: 8px; }
    input[type="text"] { flex: 1; background: #2d2d2d; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-family: monospace; }
    input[type="text"]:focus { outline: none; border-color: #569cd6; }
    button { background: #0e639c; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-family: monospace; }
    button:hover { background: #1177bb; }
  </style>
  <link rel="stylesheet" href="prism.css">
  <script src="marked.min.js"></script>
  <script src="prism.js"></script>
</head>
<body style="display: flex; flex-direction: column;">

  <h3>NeuroAnswer</h3>
  <a id="ng-btn" href="#" target="_blank" style="display:block; margin-bottom:10px; color:#569cd6; font-size:0.85em;">Open Neuroglancer ↗</a>
  <div id="chat-history"></div>
  <div class="input-row">
    <input type="text" id="chat-input" placeholder="Query the connectome...">
    <button id="send-btn">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
