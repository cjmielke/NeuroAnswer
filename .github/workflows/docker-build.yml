name: Docker Build

on:
  push:
    branches: [main, v2-refactor]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        env:
          ANTHROPIC_API_KEY: ci-placeholder
          CAVE_TOKEN: ci-placeholder
        run: docker compose build